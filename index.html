<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>WebGentoo</title>
    <link rel="stylesheet" href="./public/vendor/xterm/xterm.css">
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main class="app" id="app">
      <section class="topbar" aria-label="VM controls">
        <div class="brand">
          <h1>WebGentoo</h1>
          <p id="statusText">Preparing browser VM</p>
        </div>
        <div class="controls">
          <button class="icon-button" id="bootButton" type="button" title="Boot VM" aria-label="Boot VM">
            <span aria-hidden="true">&gt;</span>
          </button>
          <button class="icon-button" id="resetButton" type="button" title="Reset VM" aria-label="Reset VM">
            <span aria-hidden="true">R</span>
          </button>
          <button class="icon-button" id="fullscreenButton" type="button" title="Fullscreen" aria-label="Fullscreen">
            <span aria-hidden="true">[]</span>
          </button>
        </div>
      </section>

      <section class="vm-shell" aria-label="Gentoo terminal">
        <div class="terminal-wrap" id="terminal"></div>
        <div class="screen" id="screenContainer" aria-hidden="true">
          <div></div>
          <canvas></canvas>
        </div>
      </section>

      <section class="statusbar" aria-label="VM status">
        <span id="storageStatus">Storage: checking</span>
        <span id="imageStatus">Image: not checked</span>
        <span id="saveStatus">State: not saved</span>
      </section>

      <div class="loader" id="loader" role="status" aria-live="polite">
        <div class="loader-box">
          <p class="loader-title" id="loaderTitle">Starting WebGentoo</p>
          <div class="progress" aria-hidden="true">
            <span id="progressBar"></span>
          </div>
          <p class="loader-detail" id="loaderDetail">Checking browser support</p>
        </div>
      </div>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
