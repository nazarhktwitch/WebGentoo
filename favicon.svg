<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>
    <linearGradient id="gGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ddb6f2"/>
      <stop offset="100%" stop-color="#cba6f7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <circle cx="18" cy="18" r="4" fill="#f38ba8"/>
  <circle cx="30" cy="18" r="4" fill="#f9e2af"/>
  <circle cx="42" cy="18" r="4" fill="#a6e3a1"/>

  <text x="50" y="66" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="52" font-weight="900" text-anchor="middle" fill="url(#gGrad)" filter="url(#glow)">G</text>

  <text x="50" y="85" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle" fill="#a6e3a1">&gt;_web</text>
</svg>
